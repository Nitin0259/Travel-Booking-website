<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinations | Roamify</title>
    <link rel="stylesheet" href="/Assets/CSS/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 font-sans transition-colors duration-300">

    <header class="sticky top-0 z-40 w-full glass shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="../index.html" class="flex items-center space-x-2 text-2xl font-bold bg-linear-to-r from-skyBlue to-tealAccent bg-clip-text text-transparent">
                <i class="fa-solid fa-earth-americas text-skyBlue"></i> <span>Roamify</span>
            </a>
            <nav class="hidden md:flex items-center space-x-8 font-medium">
                <a href="../index.html" class="hover:text-skyBlue transition-colors">Home</a>
                <a href="destinations.html" class="text-skyBlue">Destinations</a>
                <a href="packages.html" class="hover:text-skyBlue transition-colors">Packages</a>
                <a href="about.html" class="hover:text-skyBlue transition-colors">About Us</a>
                <a href="contact.html" class="hover:text-skyBlue transition-colors">Contact Us</a>
            </nav>
            <div class="hidden md:flex items-center space-x-4">
                <button
                    class="myToggleBtn cursor-pointer p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 text-xl transition-colors">
                    <i class="fa-solid fa-moon theme_icon text-slate-600"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 mb-12">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight">Explore the World</h1>
                <p class="text-slate-500 dark:text-slate-400 mt-1">Filter pristine environments according to your strategic holiday blueprints.</p>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                <input type="text" placeholder="Search locations..." class="px-4 py-2.5 rounded-xl border dark:bg-slate-800 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-skyBlue min-w-60">
            </div>
        </div>
    </main>

    <script src="JavaScript/script.js"></script>
</body>
</html>
